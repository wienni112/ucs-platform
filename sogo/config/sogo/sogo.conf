{
  /*
   * Template only.
   * Replace all values from .env or render this file from your deployment tooling.
   */

  SOGoProfileURL = "postgresql://${SOGO_DB_USER}:${SOGO_DB_PASSWORD}@${SOGO_DB_HOST}:${SOGO_DB_PORT}/${SOGO_DB_NAME}/sogo_user_profile";
  OCSFolderInfoURL = "postgresql://${SOGO_DB_USER}:${SOGO_DB_PASSWORD}@${SOGO_DB_HOST}:${SOGO_DB_PORT}/${SOGO_DB_NAME}/sogo_folder_info";
  OCSSessionsFolderURL = "postgresql://${SOGO_DB_USER}:${SOGO_DB_PASSWORD}@${SOGO_DB_HOST}:${SOGO_DB_PORT}/${SOGO_DB_NAME}/sogo_sessions_folder";
  OCSEMailAlarmsFolderURL = "postgresql://${SOGO_DB_USER}:${SOGO_DB_PASSWORD}@${SOGO_DB_HOST}:${SOGO_DB_PORT}/${SOGO_DB_NAME}/sogo_alarms_folder";
  OCSStoreURL = "postgresql://${SOGO_DB_USER}:${SOGO_DB_PASSWORD}@${SOGO_DB_HOST}:${SOGO_DB_PORT}/${SOGO_DB_NAME}/sogo_store";
  OCSCacheFolderURL = "postgresql://${SOGO_DB_USER}:${SOGO_DB_PASSWORD}@${SOGO_DB_HOST}:${SOGO_DB_PORT}/${SOGO_DB_NAME}/sogo_cache_folder";

  SOGoTimeZone = "${TZ}";
  SOGoLanguage = "${SOGO_LANGUAGE}";
  SOGoMailDomain = "example.org";
  SOGoPageTitle = "SOGo Mail";
  SOGoVacationEnabled = YES;
  SOGoForwardEnabled = YES;
  SOGoSieveScriptsEnabled = YES;
  SOGoAppointmentSendEMailNotifications = YES;
  SOGoDraftsFolderName = Drafts;
  SOGoSentFolderName = Sent;
  SOGoTrashFolderName = Trash;

  SOGoIMAPServer = "imaps://${IMAP_SERVER}:${IMAP_PORT}";
  SOGoSMTPServer = "${SMTP_SERVER}:${SMTP_PORT}";
  SOGoSieveServer = "${SIEVE_SERVER}";
  SOGoMailingMechanism = smtp;
  SOGoMailAuxiliaryUserAccountsEnabled = YES;

  WOWorkersCount = 3;
  WOPort = 20000;
  WOLogFile = "/var/log/sogo/sogo.log";

  SOGoUserSources = (
    {
      type = ldap;
      id = users;
      CNFieldName = cn;
      UIDFieldName = ${LDAP_LOGIN_ATTRIBUTE};
      baseDN = "${LDAP_USERS_DN}";
      bindDN = "${LDAP_BIND_DN}";
      bindPassword = "${LDAP_BIND_PASSWORD}";
      canAuthenticate = YES;
      displayName = "UCS LDAP";
      hostname = "${LDAP_HOST}";
      port = ${LDAP_PORT};
      encryption = none;
      filter = "(objectClass=person)";
      IDFieldName = uid;
      IMAPHostFieldName = mailHost;
      MailFieldNames = (mailPrimaryAddress, mailAlternativeAddress);
      SearchFields = (cn, sn, givenName, mailPrimaryAddress);
      multipleBookingsFieldName = "roomBookingMultipleBookings";
      ModulesConstraints = { Mail = { }; Calendar = { }; Contacts = { }; };
    }
  );
}
